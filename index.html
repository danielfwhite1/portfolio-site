<!doctype html>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"

  <body>
    <canvas id="beams-bg"></canvas>

    <!-- ── About section content ── -->
    <template id="section-about">
      <div class="about-section">
        <div class="about-images">
          <div class="img-wrap">
            <img src="images/headshot.jpg" alt="Daniel White" />
          </div>
          <div class="img-wrap"><img src="images/sdfc.jpeg" alt="SDFC" /></div>
          <div class="img-wrap">
            <img src="images/brewery.jpg" alt="Brewery" />
          </div>
          <div class="img-wrap">
            <img src="images/sunset.jpg" alt="Sunset" />
          </div>
        </div>
        <div class="body-copy">
          <p>
            I'm Daniel, a customer success engineer based out of San Diego, CA.
            I'm passionate about software development, sports, and spending time
            outdoors with friends and family. A few of my hobbies include golf,
            beach volleyball, snowboarding, hiking, and trying new bars and
            restaurants.
          </p>
          <p>
            I studied Statistics and Data Science at
            <a href="https://www.ucsb.edu" target="_blank">UC Santa Barbara</a>
            and completed a Front End Software Development program at
            <a href="https://promineotech.com" target="_blank">Promineo Tech</a
            >. After working at
            <a href="https://www.theshoppad.com" target="_blank">ShopPad</a>,
            <a href="https://www.yardi.com" target="_blank">Yardi</a>, and
            <a href="https://tesla.com" target="_blank">Tesla</a>, I now
            dedicate my spare time to building iOS apps and professional
            websites, such as this one.
          </p>
        </div>
      </div>
    </template>

    <!-- ── Projects section content ── -->
    <template id="section-projects">
      <div class="projects-section">
        <div class="project-row">
          <div>
            <div class="wk-title">Market Pulse</div>
            <div class="wk-desc">SwiftUI iOS stock tracker with real-time
quotes, portfolio performance, market
news, and push notifications</div>
          </div>
          <div class="img-wrap"><img src="https://placehold.co/800x500/1a1a1a/2a2a2a"></div>
        </div>
        <div class="project-row">
          <div>
            <div class="wk-title">Finance API</div>
            <div class="wk-desc">Python/Flask REST API aggregating financial
data sources with rate-limiting, caching,
and Swagger documentation</div>
          </div>
          <div class="img-wrap"><img src="https://placehold.co/800x500/1a1a1a/2a2a2a"></div>
        </div>
        <div class="project-row">
          <div>
            <div class="wk-title">Portfolio Site</div>
            <div class="wk-desc">Minimal dark-mode portfolio built with
vanilla HTML, CSS, and JavaScript featuring
smooth transitions and a custom cursor</div>
          </div>
          <div class="img-wrap"><img src="https://placehold.co/800x500/1a1a1a/2a2a2a"></div>
        </div>
      </div>
    </template>

    <!-- ── Work section content ── -->
    <template id="section-work">
      <div class="work-section">
        <div>
          <div class="wk-title">ShopPad</div>
          <div class="wk-desc">Customer Success Engineer resolving
technical issues for Shopify merchants,
reviewing code and developing SOPs</div>
          <div class="wk-counter">2021–Present</div>
        </div>
        <div>
          <div class="wk-title">Yardi</div>
          <div class="wk-desc">Technical Account Manager leading
product implementation, client onboarding,
and enterprise software testing</div>
          <div class="wk-counter">2020–2021</div>
        </div>
        <div>
          <div class="wk-title">Pensionmark</div>
          <div class="wk-desc">Investment Operations Intern maintaining
500+ investment plans and generating
portfolio analysis reports</div>
          <div class="wk-counter">2019–2020</div>
        </div>
      </div>
    </template>

              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
