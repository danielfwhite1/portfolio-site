<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daniel White — Software Developer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        border: 0;
        vertical-align: baseline;
        box-sizing: border-box;
      }

      body {
        cursor: none;
        font-family: "Inter", helvetica, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
        background: #111;
        color: #fff;
        letter-spacing: -2px;
      }

      /* ── Text selection ── */
      ::selection {
        background: #fff;
        color: #111;
      }

      /* ── Custom cursor ── */
      .cursor-dot {
        position: fixed;
        width: 7px;
        height: 7px;
        background: #fff;
        border-radius: 50%;
        pointer-events: none;
        z-index: 9999;
        transform: translate(-50%, -50%);
        transition:
          width 0.2s ease,
          height 0.2s ease,
          background 0.2s ease;
        will-change: left, top;
      }
      .cursor-dot.on-link {
        width: 5px;
        height: 5px;
        background: #d4a853;
      }
      .cursor-ring {
        position: fixed;
        width: 38px;
        height: 38px;
        border: 1.5px solid rgba(255, 255, 255, 0.5);
        border-radius: 50%;
        pointer-events: none;
        z-index: 9998;
        transform: translate(-50%, -50%);
        transition:
          width 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
          height 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94),
          border-color 0.2s ease;
        will-change: left, top;
      }
      .cursor-ring.on-link {
        width: 56px;
        height: 56px;
        border-color: #d4a853;
      }

      /* ── Floating cursor icon for contact links ── */
      .cursor-icon {
        position: fixed;
        width: 18px;
        height: 18px;
        pointer-events: none;
        z-index: 10000;
        transform: translate(12px, 12px);
        opacity: 0;
        transition: opacity 0.15s ease;
      }
      .cursor-icon.visible {
        opacity: 1;
      }

      /* ── Site name — warm-tinted header ── */
      .site-name {
        color: #bdb5aa;
        display: block;
        font-size: 6.75vw;
        line-height: 1.1;
        letter-spacing: -2px;
        font-weight: 300;
      }

      /* ── Subtitle — smaller, slightly dimmer ── */
      .site-subtitle {
        font-size: 4.2vw;
        line-height: 1.3;
        color: #7d7870;
      }

      /* ── Gap between header and nav ── */
      .nav-gap {
        margin-top: 44px;
      }

      /* ── Big nav text ── */
      .big {
        font-size: 6.75vw;
        line-height: 1.1;
        letter-spacing: -2px;
        display: block;
        font-weight: 300;
        margin-bottom: 10px;
      }

      /* ── Say Hello button ── */
      .say-hello-btn {
        display: inline-block;
        margin-top: 2em;
        padding: 14px 32px;
        font-size: 1.9vw;
        font-family: inherit;
        font-weight: 300;
        letter-spacing: -1px;
        color: #fff;
        border: 1px solid rgba(255, 255, 255, 0.3);
        text-decoration: none;
        transition:
          border-color 0.25s ease,
          color 0.25s ease;
      }
      .say-hello-btn:hover {
        border-color: #d4a853;
        color: #d4a853;
      }

      .muted {
        color: #888;
      }

      /* Active section heading — warm gradient + soft glow */
      .section-active {
        background: linear-gradient(
          110deg,
          #ffffff 0%,
          #f8efdc 70%,
          #e8d4a0 100%
        );
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        text-shadow: none;
        filter: drop-shadow(0 0 32px rgba(255, 240, 200, 0.18));
      }

      /* Nav link hover: slide right + brighten */
      a.big {
        transition:
          color 0.25s ease,
          transform 0.25s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }
      a.big.muted:hover {
        color: #bbb;
      }
      a.big:hover {
        transform: translateX(8px);
      }

      a {
        color: inherit;
        text-decoration: underline;
        cursor: none;
      }
      .plain {
        text-decoration: none;
      }

      /* ── Contact links with icons ── */
      .contact-link {
        display: inline-flex;
        align-items: center;
        gap: 14px;
      }
      .contact-link svg {
        flex-shrink: 0;
        opacity: 0.6;
        transition: opacity 0.2s ease;
      }
      .contact-link:hover svg {
        opacity: 1;
      }

      #page {
        padding: 32px 40px 56px;
        opacity: 1;
        transition: opacity 0.3s ease;
      }
      #page.fade-out {
        opacity: 0;
      }

      /* ── Body copy ── */
      .body-copy {
        font-size: 2.4vw;
        line-height: 1.5;
        letter-spacing: -2px;
        font-weight: 300;
      }

      /* ── Work items ── */
      .wk-title {
        font-size: 2.3vw;
        line-height: 1.3;
        letter-spacing: -2px;
        font-weight: 300;
        transition: color 0.2s ease;
      }
      .wk-title:hover {
        color: #d4a853;
      }

      .wk-desc {
        font-size: 2vw;
        line-height: 1.4;
        letter-spacing: -1px;
        color: #666;
        font-weight: 300;
      }

      .wk-counter {
        font-size: 1.6vw;
        color: #666;
        letter-spacing: -1px;
      }

      /* ── Photos ── */
      .photo-about {
        width: 280px;
        height: 280px;
        object-fit: cover;
        object-position: center top;
        display: block;
      }

      .photo-work {
        width: 100%;
        display: block;
        object-fit: cover;
      }

      /* ── Work image hover ── */
      .img-wrap {
        overflow: hidden;
        margin-top: 14px;
      }
      .img-wrap img {
        transition:
          transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94),
          filter 0.4s ease;
        filter: brightness(0.92);
      }
      .img-wrap:hover img {
        transform: scale(1.02);
        filter: brightness(1);
      }
    </style>
  </head>
  <body>
    <div id="page"></div>

    <script>
      /* ─────────── Navigation ─────────── */
      const ITEMS = ["about", "work", "contact"];
      const LABELS = { about: "About", work: "Experience", contact: "Contact" };
      let current = null;

      function go(id) {
        const page = document.getElementById("page");
        page.classList.add("fade-out");
        setTimeout(() => {
          current = current === id ? null : id;
          draw();
          window.scrollTo(0, 0);
          page.classList.remove("fade-out");
        }, 280);
      }

      function draw() {
        let h = "";

        h += `<span class="site-name">Daniel White</span>`;
        h += `<span class="site-name site-subtitle">Software Developer</span>`;
        h += `<div class="nav-gap"></div>`;

        if (current === null) {
          for (const item of ITEMS) {
            h += `<a href="#" class="big muted plain" onclick="go('${item}');return false;">${LABELS[item]}</a>`;
          }
        } else {
          const idx = ITEMS.indexOf(current);

          for (let i = 0; i < idx; i++) {
            h += `<a href="#" class="big muted plain" onclick="go('${ITEMS[i]}');return false;">${LABELS[ITEMS[i]]}</a>`;
          }

          h += `<a href="#" class="big plain section-active" onclick="go('${ITEMS[idx]}');return false;">${LABELS[ITEMS[idx]]}</a>`;
          h += sectionContent(current);

          if (idx + 1 < ITEMS.length) h += `<div style="margin-top:28px;"></div>`;
          for (let i = idx + 1; i < ITEMS.length; i++) {
            h += `<a href="#" class="big muted plain" onclick="go('${ITEMS[i]}');return false;">${LABELS[ITEMS[i]]}</a>`;
          }
        }

        document.getElementById("page").innerHTML = h;
      }

      /* ─────────── Icons ─────────── */
      const ICON_EMAIL = `<svg width="1.1em" height="1.1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>`;
      const ICON_LINKEDIN = `<svg width="1.1em" height="1.1em" viewBox="0 0 24 24" fill="currentColor"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>`;
      const ICON_GITHUB = `<svg width="1.1em" height="1.1em" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>`;

      const CURSOR_ICONS = {
        email: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d4a853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>`,
        linkedin: `<svg width="18" height="18" viewBox="0 0 24 24" fill="#d4a853"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>`,
        github: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#d4a853" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"/><path d="M9 18c-4.51 2-5-2-7-2"/></svg>`,
      };

      /* ─────────── Section content ─────────── */
      function sectionContent(id) {
        if (id === "about") {
          return `
          <div style="margin-top:20px;">
            <div style="display:flex; gap:8px; align-items:flex-start;">
              <div class="img-wrap" style="margin-top:0; flex-shrink:0;"><img src="images/headshot.jpg" class="photo-about" alt="Daniel White"></div>
              <div class="img-wrap" style="margin-top:0; flex-shrink:0;"><img src="images/brewery.jpg" style="width:280px; height:280px; object-fit:cover; object-position:center; display:block;"></div>
              <div class="img-wrap" style="margin-top:0; flex-shrink:0;"><img src="images/sunset.jpg" style="width:280px; height:280px; object-fit:cover; object-position:center top; display:block;"></div>
              <div class="img-wrap" style="margin-top:0; flex-shrink:0;"><img src="images/group.jpg" style="width:280px; height:280px; object-fit:cover; object-position:center; display:block;"></div>
            </div>
            <div class="body-copy" style="margin-top:28px;">
              <p>I'm a software developer and data scientist currently based in San Diego, CA. My background spans iOS development, API engineering, and financial data analysis — with a focus on building clean, functional products from the ground up.</p>
              <p style="margin-top:1.5em;">I studied Statistics and Data Science at <a href="https://www.ucsb.edu" target="_blank">UC Santa Barbara</a> and completed a Front End Software Development program at <a href="https://promineotech.com" target="_blank">Promineo Tech</a>. I've worked at <a href="https://www.shoppad.co" target="_blank">ShopPad</a>, <a href="https://www.yardi.com" target="_blank">Yardi</a>, and <a href="https://pensionmark.com" target="_blank">Pensionmark</a>, and I'm currently building iOS apps and REST APIs in my spare time.</p>
              <p style="margin-top:1.5em;">I'm actively looking for software engineering opportunities — whether that's full-time or interesting freelance work in iOS, APIs, or fintech. My inbox is always open.</p>
              <a href="mailto:danielfwhite1@gmail.com" class="say-hello-btn plain">Say Hello →</a>
            </div>
          </div>`;
        }

        if (id === "contact") {
          return `
          <div class="body-copy" style="margin-top:20px;">
            <div style="margin-bottom:10px;"><a href="mailto:danielfwhite1@gmail.com" class="plain contact-link" data-cursor-type="email">${ICON_EMAIL}<span>Email</span></a></div>
            <div style="margin-bottom:10px;"><a href="https://linkedin.com/in/danielfwhite/" target="_blank" class="plain contact-link" data-cursor-type="linkedin">${ICON_LINKEDIN}<span>LinkedIn</span></a></div>
            <div><a href="https://github.com/danielfwhite1" target="_blank" class="plain contact-link" data-cursor-type="github">${ICON_GITHUB}<span>GitHub</span></a></div>
          </div>`;
        }

        if (id === "work") {
          const projects = [
            {
              name: "Market Pulse",
              desc: "SwiftUI iOS stock tracker with real-time\nquotes, portfolio performance, market\nnews, and push notifications",
              img: null,
              imgH: null,
              counter: "",
            },
            {
              name: "Finance API",
              desc: "Python/Flask REST API aggregating financial\ndata sources with rate-limiting, caching,\nand Swagger documentation",
              img: null,
              imgH: null,
              counter: "",
            },
            {
              name: "Campus Event",
              desc: "Native iOS app for event discovery with\nNode.js backend, WebSockets, geolocation,\nand push notifications",
              img: null,
              imgH: null,
              counter: "",
            },
            {
              name: "ShopPad",
              desc: "Customer Success Engineer resolving\ntechnical issues for Shopify merchants,\nreviewing code and developing SOPs",
              img: null,
              imgH: null,
              counter: "2022–Present",
            },
            {
              name: "Yardi",
              desc: "Technical Account Manager leading\nproduct implementation, client onboarding,\nand enterprise software testing",
              img: null,
              imgH: null,
              counter: "Summer 2023",
            },
            {
              name: "Pensionmark",
              desc: "Investment Operations Intern maintaining\n500+ investment plans and generating\nportfolio analysis reports",
              img: null,
              imgH: null,
              counter: "2022–2023",
            },
          ];

          let wh = `<div style="margin-top:20px;">`;
          for (const p of projects) {
            wh += `<div>`;
            wh += `<div class="wk-title">${p.name}</div>`;
            wh += `<div class="wk-desc" style="white-space:pre-line;">${p.desc}</div>`;
            if (p.img) {
              wh += `<div class="img-wrap">
              <img src="${p.img}" class="photo-work" style="height:${p.imgH}; object-fit:cover;" alt="${p.name}">
            </div>`;
            }
            if (p.counter) {
              wh += `<div class="wk-counter" style="margin-top:8px; margin-bottom:28px;">${p.counter}</div>`;
            } else {
              wh += `<div style="margin-bottom:28px;"></div>`;
            }
            wh += `</div>`;
          }
          wh += `</div>`;
          return wh;
        }

        return "";
      }

      draw();

      /* ─────────── Custom cursor ─────────── */
      const dot = Object.assign(document.createElement("div"), {
        className: "cursor-dot",
      });
      const ring = Object.assign(document.createElement("div"), {
        className: "cursor-ring",
      });
      const iconEl = Object.assign(document.createElement("div"), {
        className: "cursor-icon",
      });
      document.body.append(dot, ring, iconEl);

      let mx = -200,
        my = -200,
        rx = -200,
        ry = -200;

      document.addEventListener("mousemove", (e) => {
        mx = e.clientX;
        my = e.clientY;
      });

      (function tick() {
        rx += (mx - rx) * 0.18;
        ry += (my - ry) * 0.18;
        dot.style.cssText += `left:${mx}px;top:${my}px;`;
        ring.style.cssText += `left:${rx}px;top:${ry}px;`;
        iconEl.style.cssText += `left:${mx}px;top:${my}px;`;
        requestAnimationFrame(tick);
      })();

      document.addEventListener("mouseover", (e) => {
        const link = e.target.closest("a");
        if (link) {
          dot.classList.add("on-link");
          ring.classList.add("on-link");
          const type = link.dataset.cursorType;
          if (type && CURSOR_ICONS[type]) {
            iconEl.innerHTML = CURSOR_ICONS[type];
            iconEl.classList.add("visible");
          }
        }
      });

      document.addEventListener("mouseout", (e) => {
        const link = e.target.closest("a");
        if (link) {
          dot.classList.remove("on-link");
          ring.classList.remove("on-link");
          iconEl.classList.remove("visible");
        }
      });
    </script>
  </body>
</html>
